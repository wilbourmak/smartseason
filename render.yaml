services:
  # Backend API
  - type: web
    name: smartseason-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

  # Frontend Static Site
  - type: static
    name: smartseason-web
    plan: free
    buildCommand: npm install && npm run build
    publishDir: build
    rootDir: frontend
    envVars:
      - key: REACT_APP_API_URL
        value: https://smartseason-api-0gyy.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://smartseason-api-0gyy.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

