services:
  # Backend API with SQLite
  - type: web
    name: smartseason-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: RENDER_DISK_PATH
        value: /var/lib/render

